services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wecan-backend
    env_file:
      - backend/.env.production
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/media:/app/backend/media
      - ./deploy/logs/backend:/app/backend/logs
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
    container_name: wecan-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/logs/nginx:/var/log/nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
