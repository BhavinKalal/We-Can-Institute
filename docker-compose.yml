services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wecan-backend
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: sqlite:////app/backend/data/wecan.db
      MEDIA_ROOT: /app/backend/media
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/media:/app/backend/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
