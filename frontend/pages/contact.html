<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact Us | We Can Institute</title>

  <!-- Core CSS -->
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/sections.css" />
</head>
<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- PAGE HEADER -->
  <section class="section-sm">
    <div class="container section-header">
      <h2>Contact Us</h2>
      <p>Start your English learning journey with us today</p>
    </div>
  </section>

  <!-- CONTACT SECTION -->
  <section class="section">
    <div class="container grid grid-2">

      <!-- CONTACT INFO -->
      <div class="card">
        <h3>We Can Institute of English</h3>
        <p>English, Public Speaking & Personality Development</p>

        <p>📍 Ahmedabad, Gujarat</p>
        <p>📞 +91 XXXXXXXXXX</p>
        <p>✉ info@wecanenglish.com</p>
      </div>

      <!-- CONTACT FORM -->
      <div class="card">
        <h3>Send an Enquiry</h3>

        <form id="contact-form">
          <div class="form-group">
            <input type="text" name="name" placeholder="Your Name" required />
          </div>

          <div class="form-group">
            <input type="tel" name="phone" placeholder="Phone Number" required />
          </div>

          <div class="form-group">
            <input type="email" name="email" placeholder="Email (optional)" />
          </div>

          <div class="form-group">
            <textarea
              name="message"
              rows="4"
              placeholder="Your Message"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary">
            Submit Enquiry
          </button>

          <p id="form-status"></p>
        </form>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- JS -->
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/contact.js"></script>

</body>
</html>
