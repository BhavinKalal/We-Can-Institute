<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - WE CAN</title>
  <link rel="stylesheet" href="assets/css/admin-base.css" />
  <link rel="stylesheet" href="assets/css/admin-layout.css" />
  <link rel="stylesheet" href="assets/css/admin-components.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, rgba(27,155,215,0.12), transparent 40%),
                  radial-gradient(circle at 80% 90%, rgba(227,30,36,0.1), transparent 40%),
                  #f8fafc;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg);
      padding: 28px;
    }
    .login-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--text-3); margin-bottom: 20px; }
    .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .login-brand img { width: 36px; height: 36px; object-fit: contain; }
    .login-help { margin-top: 12px; font-size: 12px; color: var(--text-3); }
  </style>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-brand">
        <img src="assets/images/wecan-log.png" alt="WE CAN" />
        <div>
          <div class="t-small text-muted">WE CAN Institute</div>
          <div class="t-strong">Admin Panel</div>
        </div>
      </div>
      <h1 class="login-title">Sign In</h1>
      <p class="login-sub">Only administrators can manage content and enquiries.</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="email" type="email" class="form-input" placeholder="admin@wecan.local" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Enter password" required />
        </div>
        <button id="loginBtn" class="btn btn--primary w-full" type="submit">
          <i data-lucide="log-in"></i> Login
        </button>
      </form>
      <p class="login-help">Default credentials can be configured via backend environment variables.</p>
    </section>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();

      const form = document.getElementById('loginForm');
      const btn = document.getElementById('loginBtn');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        if (!email || !password) {
          showToast('Email and password are required', 'error');
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader-2"></i> Signing in...';
        if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [btn] });

        try {
          await API.login(email, password);
          showToast('Login successful', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 300);
        } catch (error) {
          console.error('Login failed:', error);
          showToast(error.message || 'Invalid email or password', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="log-in"></i> Login';
          if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [btn] });
        }
      });
    });
  </script>
</body>
</html>
