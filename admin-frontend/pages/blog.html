<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog â€” WE CAN Admin</title>
  <link rel="stylesheet" href="../assets/css/admin-base.css" />
  <link rel="stylesheet" href="../assets/css/admin-layout.css" />
  <link rel="stylesheet" href="../assets/css/admin-components.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
    .sidebar-overlay.show{display:block;}
    .blog-table__title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .blog-table__meta { font-size: 12px; color: var(--text-3); }
    .blog-table__date { font-size: 13px; color: var(--text-3); }
    .blog-table__actions { display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; }
    .blog-table__status { display: flex; align-items: center; justify-content: center; }
    .blog-table th:nth-child(1), .blog-table td:nth-child(1) { min-width: 280px; }
    .blog-table th:nth-child(2), .blog-table td:nth-child(2) { min-width: 160px; }
    .blog-table th:nth-child(3), .blog-table td:nth-child(3) { min-width: 140px; }
    .blog-table th:nth-child(4), .blog-table td:nth-child(4) { width: 130px; text-align: center; }
    .blog-table th:nth-child(5), .blog-table td:nth-child(5) { width: 120px; text-align: center; }
    .blog-table th:nth-child(6), .blog-table td:nth-child(6) { width: 110px; text-align: center; }
  </style>
</head>
<body>
<div class="admin-app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <img src="../assets/images/wecan-log.png" alt="WE CAN" onerror="this.style.display='none'" />
      <div class="sidebar__logo-text"><span class="sidebar__logo-name">WE CAN</span><span class="sidebar__logo-sub">Admin Panel</span></div>
    </div>
    <nav class="sidebar__nav">
      <span class="sidebar__section-label">Overview</span>
      <a href="../index.html" class="sidebar__link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <span class="sidebar__section-label">Content</span>
      <a href="hero.html"               class="sidebar__link"><i data-lucide="monitor-play"></i> Hero Section</a>
      <a href="batches.html"            class="sidebar__link"><i data-lucide="book-open"></i> Batches</a>
      <a href="faculty.html"            class="sidebar__link"><i data-lucide="users"></i> Faculty</a>
      <a href="gallery.html"            class="sidebar__link"><i data-lucide="image"></i> Gallery</a>
      <a href="blog.html"               class="sidebar__link active"><i data-lucide="pen-line"></i> Blog</a>
      <a href="testimonials.html"       class="sidebar__link"><i data-lucide="message-square-quote"></i> Testimonials</a>
      <span class="sidebar__section-label">Activity</span>
      <a href="enquiries.html"          class="sidebar__link"><i data-lucide="inbox"></i> Enquiries</a>
      <span class="sidebar__section-label">System</span>
      <a href="settings.html"           class="sidebar__link"><i data-lucide="settings"></i> Settings</a>
    </nav>
    <div class="sidebar__footer">
      <a href="../../frontend/index.html" class="sidebar__view-site" target="_blank"><i data-lucide="external-link"></i> View Website</a>
      <div class="sidebar__footer-user"><div class="sidebar__avatar">A</div><div class="sidebar__user-info"><div class="sidebar__user-name">Admin</div><div class="sidebar__user-role">Super Admin</div></div></div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="admin-main">
    <div class="topbar">
      <div class="topbar__left">
        <button class="topbar__hamburger btn btn--ghost btn--icon" id="sidebarToggle"><i data-lucide="menu"></i></button>
        <div class="topbar__left-text"><div class="t-page">Blog</div><div class="topbar__breadcrumb"><a href="../index.html">Dashboard</a> <i data-lucide="chevron-right"></i> <span>Blog</span></div></div>
      </div>
      <div class="topbar__right">
        <button class="btn btn--primary" id="newPostBtn"><i data-lucide="plus"></i> New Post</button>
      </div>
    </div>

    <div class="page-content">
      <!-- List view -->
      <div id="listView">
        <div class="toolbar">
          <div class="search-box"><i data-lucide="search"></i><input type="text" id="searchInput" placeholder="Search posts..." /></div>
          <select class="filter-select" id="statusFilter"><option value="">All Status</option><option value="published">Published</option><option value="draft">Draft</option></select>
          <select class="filter-select" id="catFilter"><option value="">All Categories</option></select>
        </div>
        <div class="table-wrap">
          <table class="table blog-table">
            <thead>
              <tr>
                <th>Post</th>
                <th>Category</th>
                <th>Author</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="blogList">
              <tr><td colspan="6" class="td-loading">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Editor view (hidden initially) -->
      <div id="editorView" class="js-hidden">
        <div class="editor-back-row">
          <button class="btn btn--ghost btn--sm" id="backToListBtn"><i data-lucide="arrow-left"></i> Back to Posts</button>
          <span class="editing-label text-muted" id="editingLabel">New Post</span>
        </div>
        <div class="editor-layout">
          <div>
            <div class="card card--mb">
              <div class="card__body">
                <div class="form-group">
                  <label class="form-label">Post Title <span class="required">*</span></label>
                  <input type="text" class="form-input form-input--title" id="postTitle" placeholder="Enter post title..." />
                </div>
                <div class="form-group">
                  <label class="form-label">Excerpt / Summary</label>
                  <textarea class="form-textarea" id="postExcerpt" rows="2" placeholder="Brief summary shown in post cards..."></textarea>
                </div>
              </div>
            </div>
            <div class="card">
              <div class="card__header"><span class="card__title">Content</span></div>
              <div class="card__body card__body--flush">
                <div class="editor-toolbar">
                  <button class="editor-toolbar-btn" onclick="fmt('bold')" title="Bold"><b>B</b></button>
                  <button class="editor-toolbar-btn" onclick="fmt('italic')" title="Italic"><i>I</i></button>
                  <button class="editor-toolbar-btn" onclick="fmt('underline')" title="Underline"><u>U</u></button>
                  <div class="editor-toolbar-sep"></div>
                  <button class="editor-toolbar-btn" onclick="fmt('insertUnorderedList')" title="Bullet List"><i data-lucide="list" class="toolbar-icon"></i></button>
                  <button class="editor-toolbar-btn" onclick="fmt('insertOrderedList')" title="Numbered List"><i data-lucide="list-ordered" class="toolbar-icon"></i></button>
                  <div class="editor-toolbar-sep"></div>
                  <button class="editor-toolbar-btn" onclick="fmt('formatBlock','H2')" title="Heading">H2</button>
                  <button class="editor-toolbar-btn" onclick="fmt('formatBlock','H3')" title="Subheading">H3</button>
                  <button class="editor-toolbar-btn" onclick="fmt('formatBlock','P')" title="Paragraph">P</button>
                </div>
                <div class="editor-content" id="postContent" contenteditable="true" data-placeholder="Start writing your post..."></div>
              </div>
            </div>
          </div>
          <!-- Sidebar -->
          <div>
            <div class="card card--mb-sm">
              <div class="card__header"><span class="card__title">Publish</span></div>
              <div class="card__body">
                <div class="form-group">
                  <label class="form-label">Status</label>
                  <select class="form-select" id="postStatus"><option value="draft">Draft</option><option value="published">Published</option></select>
                </div>
                <div class="form-group">
                  <div class="toggle-wrap">
                    <label class="toggle"><input type="checkbox" id="postFeatured" /><div class="toggle__track"></div><div class="toggle__thumb"></div></label>
                    <span class="toggle-label">Featured post</span>
                  </div>
                </div>
                <div class="btn-group">
                  <button class="btn btn--ghost w-full" id="saveDraftBtn"><i data-lucide="save"></i> Save Draft</button>
                  <button class="btn btn--primary w-full" id="publishBtn"><i data-lucide="send"></i> Publish</button>
                </div>
              </div>
            </div>
            <div class="card card--mb-sm">
              <div class="card__header"><span class="card__title">Details</span></div>
              <div class="card__body">
                <div class="form-group">
                  <label class="form-label">Category</label>
                  <select class="form-select" id="postCategory">
                    <option>Tips & Tricks</option><option>Public Speaking</option><option>Phonics</option>
                    <option>Events</option><option>Student Stories</option><option>Grammar</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Author</label>
                  <input type="text" class="form-input" id="postAuthor" placeholder="Author name" />
                </div>
                <div class="form-group">
                  <label class="form-label">Read Time</label>
                  <input type="text" class="form-input" id="postReadTime" placeholder="e.g. 5 min" />
                </div>
                <div class="form-group">
                  <label class="form-label">Cover Image</label>
                  <input type="file" id="postCoverFile" accept="image/jpeg,image/png,image/webp" class="form-input" />
                  <input type="text" class="form-input" id="postCoverUrl" placeholder="/media/blog_cover/..." readonly />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
let allPosts = [], editingId = null, pendingCoverFile = null, currentCoverUrl = '';

function toCamel(s) { return s.replace(/([-_][a-z])/ig, p => p.toUpperCase().replace('-', '').replace('_', '')); }
function toSnake(s) { return s.replace(/[A-Z]/g, l => `_${l.toLowerCase()}`); }
function transformKeys(obj, transformer) {
  if (Array.isArray(obj)) return obj.map(v => transformKeys(v, transformer));
  if (obj !== null && typeof obj === 'object') {
    return Object.keys(obj).reduce((acc, key) => {
      acc[transformer(key)] = transformKeys(obj[key], transformer);
      return acc;
    }, {});
  }
  return obj;
}

window.fmt = (cmd, val) => { document.execCommand(cmd, false, val || null); document.getElementById('postContent').focus(); };

document.getElementById('postCoverFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  pendingCoverFile = file;
  document.getElementById('postCoverUrl').value = `Pending upload: ${file.name}`;
  showToast('Cover selected. It will upload when you save.', 'info');
  e.target.value = '';
});

async function loadPosts() {
  const raw = await API.getPosts();
  allPosts = transformKeys(raw, toCamel);
  const cats = [...new Set(allPosts.map(p => p.category).filter(Boolean))];
  const cf = document.getElementById('catFilter');
  cf.innerHTML = '<option value="">All Categories</option>';
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cf.appendChild(o); });
  renderList(allPosts);
}

function renderList(data) {
  const list = document.getElementById('blogList');
  if (!data.length) {
    list.innerHTML = `<tr><td colspan="6" class="td-empty"><div class="empty-state"><i data-lucide="pen-line"></i><div class="empty-state__title">No posts yet</div><button class="btn btn--primary" onclick="openEditor()"><i data-lucide="plus"></i> Write First Post</button></div></td></tr>`;
    lucide.createIcons(); return;
  }
  list.innerHTML = data.map(p => `
    <tr>
      <td>
        <div class="blog-table__title">${p.title} ${p.featured ? '<span class="badge badge--yellow badge--xs">Featured</span>' : ''}</div>
        <div class="blog-table__meta">${p.readTime || '-'} read</div>
      </td>
      <td><span class="badge badge--blue">${p.category || 'General'}</span></td>
      <td>${p.author || '-'}</td>
      <td><span class="blog-table__date">${p.publishedDate ? fmtDate(p.publishedDate) : '-'}</span></td>
      <td><div class="blog-table__status">${statusBadge(p.status)}</div></td>
      <td>
        <div class="blog-table__actions">
          <button class="btn btn--ghost btn--sm btn--icon" onclick="editPost(${p.id})" title="Edit"><i data-lucide="pencil"></i></button>
          <button class="btn btn--ghost-red btn--sm btn--icon" onclick="deletePost(${p.id})" title="Delete"><i data-lucide="trash-2"></i></button>
        </div>
      </td>
    </tr>`).join('');
  lucide.createIcons();
}

function openEditor(post = null) {
  editingId = post ? post.id : null;
  pendingCoverFile = null;
  currentCoverUrl = post?.coverImageUrl || '';
  const listView = document.getElementById('listView');
  const editorView = document.getElementById('editorView');
  listView.style.display = 'none';
  editorView.style.display = '';
  editorView.classList.remove('js-hidden');
  document.getElementById('editingLabel').textContent = post ? `Editing: ${post.title}` : 'New Post';
  document.getElementById('postTitle').value = post?.title || '';
  document.getElementById('postExcerpt').value = post?.excerpt || '';
  document.getElementById('postContent').innerHTML = post?.content || '';
  document.getElementById('postStatus').value = post?.status || 'draft';
  document.getElementById('postFeatured').checked = post?.featured || false;
  document.getElementById('postCategory').value = post?.category || 'Tips & Tricks';
  document.getElementById('postAuthor').value = post?.author || '';
  document.getElementById('postReadTime').value = post?.readTime || '';
  document.getElementById('postCoverUrl').value = currentCoverUrl;
  lucide.createIcons();
}

function editPost(id) { openEditor(allPosts.find(p => p.id === id)); }

async function deletePost(id) {
  const p = allPosts.find(x => x.id === id);
  confirmAction(`Delete "${p.title}"?`, async () => {
    await API.deletePost(id);
    await loadPosts();
    renderList(filterPosts());
    showToast('Post deleted', 'success');
  });
}

async function savePost(status) {
  const title = document.getElementById('postTitle').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  try {
    if (pendingCoverFile) {
      const uploaded = await API.uploadBlogCover(pendingCoverFile);
      currentCoverUrl = uploaded.relative_url || uploaded.url || '';
      document.getElementById('postCoverUrl').value = currentCoverUrl;
    }

    const frontendData = {
      title,
      excerpt: document.getElementById('postExcerpt').value,
      content: document.getElementById('postContent').innerHTML,
      status: status || document.getElementById('postStatus').value,
      featured: document.getElementById('postFeatured').checked,
      category: document.getElementById('postCategory').value,
      author: document.getElementById('postAuthor').value,
      readTime: document.getElementById('postReadTime').value,
      coverImageUrl: currentCoverUrl || null,
      publishedDate: new Date().toISOString().slice(0, 10),
      isActive: true,
      sortOrder: editingId ? (allPosts.find(p => p.id === editingId)?.sortOrder || 0) : allPosts.length,
    };
    const data = transformKeys(frontendData, toSnake);
    if (editingId) {
      await API.updatePost(editingId, data);
      showToast('Post updated!', 'success');
    } else {
      await API.createPost(data);
      showToast('Post saved!', 'success');
    }
    pendingCoverFile = null;
  } catch (error) {
    showToast(error.message || 'Failed to save post', 'error');
    return;
  }
  document.getElementById('listView').style.display = '';
  const editorView = document.getElementById('editorView');
  editorView.style.display = 'none';
  editorView.classList.add('js-hidden');
  await loadPosts();
  renderList(filterPosts());
}

function filterPosts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const cat = document.getElementById('catFilter').value;
  return allPosts.filter(p =>
    (!q || p.title.toLowerCase().includes(q)) &&
    (!status || p.status === status) &&
    (!cat || p.category === cat)
  );
}

document.getElementById('newPostBtn').addEventListener('click', () => openEditor());
document.getElementById('backToListBtn').addEventListener('click', () => {
  document.getElementById('listView').style.display = '';
  const editorView = document.getElementById('editorView');
  editorView.style.display = 'none';
  editorView.classList.add('js-hidden');
});
document.getElementById('saveDraftBtn').addEventListener('click', () => savePost('draft'));
document.getElementById('publishBtn').addEventListener('click', () => savePost('published'));
['searchInput','statusFilter','catFilter'].forEach(id => document.getElementById(id).addEventListener('input', () => renderList(filterPosts())));
loadPosts();
</script>
</body>
</html>
