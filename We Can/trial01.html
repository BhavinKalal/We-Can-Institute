<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/trial.css">
</head>
<body>
    <nav class="navbar">
        Trial - Navbar
    </nav>
    <section class="road">
        <img src="images/car_topview (1).svg" class="car" alt="Car">
        
        <img src="images/profile.png" class="destination" alt="Destination">

        <!-- <img src="images/cloud.svg" alt="image-msg" class="msg"> -->
        <div class="speech-cloud" id="speech">Let's Learn English!!</div>
        <div class="cloud-01" id="cloud01"></div>
        <div class="cloud-02" id="cloud02"></div>
    </section>

    <script>
        // Show speech cloud after car stops
        setTimeout(() => {
            document.getElementById("speech").style.display = "block";
        }, 6000); // Matches the car animation time
        setTimeout(() => {
            document.getElementById("cloud01").style.display = "block";
        }, 6000);
        setTimeout(() => {
            document.getElementById("cloud02").style.display = "block";
        }, 6000);
    </script>
</body>
</html>
