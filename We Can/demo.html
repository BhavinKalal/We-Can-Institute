<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Drive Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #87CEEB;
            overflow: hidden;
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            text-align: center;
            color: white;
            font-size: 20px;
        }

        /* Road */
        .road {
            position: absolute;
            bottom: 50px;
            width: 100%;
            height: 100px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Road Lines */
        .road::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 10px;
            background: repeating-linear-gradient(90deg, white 0px, white 20px, transparent 20px, transparent 40px);
            bottom: 45px;
        }

        /* Car Animation */
        .car {
            position: absolute;
            bottom: 80px;
            left: -150px;
            width: 150px;
            animation: drive 4s linear forwards;
        }

        @keyframes drive {
            0% { left: -150px; }
            100% { left: 75%; }
        }

        /* Destination */
        .destination {
            position: absolute;
            bottom: 80px;
            right: 10%;
            width: 100px;
        }

        /* Speech Cloud */
        .speech-cloud {
            position: absolute;
            bottom: 170px;
            left: 75%;
            width: 150px;
            height: 100px;
            background: white;
            border-radius: 50px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
            line-height: 100px;
            font-weight: bold;
            font-size: 16px;
            display: none;
        }

        /* Speech Cloud Tail */
        .speech-cloud::after {
            content: "";
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 20px solid white;
        }
    </style>
</head>
<body>

    <div class="navbar">🚗 Car Driving Animation</div>

    <div class="road">
        <!-- Car (SVG) -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Vector_car_red.svg" class="car" id="car" alt="Car">
        
        <!-- Destination (SVG) -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/49/Map_marker.svg" class="destination" alt="Destination">
        
        <!-- Speech Cloud -->
        <div class="speech-cloud" id="speech">Welcome to the Destination! 🚗</div>
    </div>

    <script>
        // Show speech cloud after car stops
        setTimeout(() => {
            document.getElementById("speech").style.display = "block";
        }, 4000); // Matches the car animation time
    </script>

</body>
</html>
